<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <title>Quick Note</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #181825;
      -webkit-app-region: drag;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .title-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-icon {
      font-size: 14px;
    }

    .app-title {
      font-size: 12px;
      font-weight: 600;
      color: #89b4fa;
      letter-spacing: 0.5px;
    }

    .title-bar-actions {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .btn-icon {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover {
      background: #313244;
      color: #cdd6f4;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      gap: 8px;
    }

    textarea {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 10px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea::placeholder {
      color: #585b70;
    }

    textarea:focus {
      border-color: #89b4fa;
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }

    .status {
      font-size: 11px;
      min-height: 16px;
      flex: 1;
      padding-left: 2px;
    }

    .status.success { color: #a6e3a1; }
    .status.error   { color: #f38ba8; }
    .status.sending { color: #89b4fa; }

    .hint {
      font-size: 10px;
      color: #45475a;
      white-space: nowrap;
    }

    .btn-submit {
      padding: 5px 14px;
      border: none;
      border-radius: 5px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-submit:hover {
      background: #b4d0fe;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <div class="title-bar-left">
      <span class="app-icon">📝</span>
      <span class="app-title">Quick Note</span>
    </div>
    <div class="title-bar-actions">
      <button class="btn-icon" id="btn-settings" title="設定">⚙️</button>
      <button class="btn-icon" id="btn-minimize" title="最小化 (Esc)">—</button>
    </div>
  </div>

  <div class="main-content">
    <textarea id="note-input" placeholder="輸入筆記內容... (Ctrl+Enter 送出，Esc 最小化)"></textarea>
    <div class="bottom-bar">
      <span class="status" id="status"></span>
      <span class="hint">Ctrl+Enter 送出</span>
      <button class="btn-submit" id="btn-submit">送出到 Notion</button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
